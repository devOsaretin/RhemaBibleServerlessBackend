# Docs for the Azure Web Apps Deploy action: https://github.com/azure/functions-action
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy dotnet core project to Azure Function App - rhemabibleapp-qa

on:
  push:
    branches:
      - develop
  workflow_dispatch:

env:
  AZURE_FUNCTIONAPP_PACKAGE_PATH: '.' # set this to the path to your web app project, defaults to the repository root
  DOTNET_VERSION: '8.0.x' # set this to the dotnet version to use
  DOTNET_EF_VERSION: '8.0.11' # keep in sync with Npgsql.EntityFrameworkCore.PostgreSQL / EF Core packages

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: 'Checkout GitHub Action'
        uses: actions/checkout@v4

      - name: Setup DotNet ${{ env.DOTNET_VERSION }} Environment
        uses: actions/setup-dotnet@v1
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      # Add repository secret POSTGRES_CONNECTION_STRING (Neon / Postgres ADO.NET connection string for QA).
      # RhemaDbContextFactory reads RHEMA_POSTGRES_CONNECTION first.
      - name: Install dotnet-ef
        run: |
          dotnet tool install --global dotnet-ef --version ${{ env.DOTNET_EF_VERSION }}
          echo "$HOME/.dotnet/tools" >> "$GITHUB_PATH"

      - name: Apply EF Core database migrations
        env:
          RHEMA_POSTGRES_CONNECTION: ${{ secrets.POSTGRES_CONNECTION_STRING }}
        run: |
          if [ -z "${RHEMA_POSTGRES_CONNECTION:-}" ]; then
            echo "::error::Repository secret POSTGRES_CONNECTION_STRING is not set. Add it under Settings → Secrets and variables → Actions."
            exit 1
          fi
          dotnet ef database update \
            --project Infrastructure/Infrastructure.csproj \
            --context RhemaDbContext \
            --configuration Release

      - name: 'Resolve Project Dependencies Using Dotnet'
        shell: bash
        run: |
          pushd './${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}'
          dotnet build --configuration Release --output ./output
          popd
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_DE692DDA84F34B53A4357FEF1F99FFEF }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_309CC881A8384EC38892ADDE3E883CFE }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_396AA4E5D50F405EA3260A0CCC8EED76 }}

      - name: 'Run Azure Functions Action'
        uses: Azure/functions-action@v1
        id: fa
        with:
          app-name: 'rhemabibleapp-qa'
          slot-name: 'Production'
          package: '${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}/output'
          